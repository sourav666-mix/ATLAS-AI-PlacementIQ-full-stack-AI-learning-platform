# docker-compose.yml - mysql + redis + backend + frontend + chatterbox-tts services
# FILE: docker-compose.yml  (repo root: atlas-ai/)
# BATCH 19 - Full local stack: mysql + redis + backend + tts.
# Run:  docker compose up --build
services:
  mysql:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-atlas_root}
      MYSQL_DATABASE: atlas
    ports: ["3306:3306"]
    volumes: [mysql_data:/var/lib/mysql]
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-p${MYSQL_ROOT_PASSWORD:-atlas_root}"]
      interval: 5s
      timeout: 3s
      retries: 20
  redis:
    image: redis:7-alpine
    ports: ["6379:6379"]
  tts:
    build: ./tts-service
    ports: ["8020:8020"]
    environment:
      TTS_DEVICE: cpu
  backend:
    build: ./backend
    ports: ["8000:8000"]
    env_file: .env
    environment:
      DATABASE_URL: mysql+aiomysql://root:${MYSQL_ROOT_PASSWORD:-atlas_root}@mysql:3306/atlas
      REDIS_URL: redis://redis:6379/0
      CHATTERBOX_TTS_URL: http://tts:8020/speak
    depends_on:
      mysql: {condition: service_healthy}
      redis: {condition: service_started}
      tts: {condition: service_started}
volumes:
  mysql_data: