# FILE: pytest.ini  (backend repo root, next to app/)
# BATCH 18 (new) - Suite config. Tests are plain sync functions driving the
# async engine through the conftest fixtures, so no asyncio plugin is needed.
[pytest]
testpaths = tests
python_files = test_*.py
addopts = -q --tb=short
filterwarnings =
    ignore::DeprecationWarning
    ignore::sqlalchemy.exc.SAWarning